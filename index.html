<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Shelf</title>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e0e;
      --surface:    #181818;
      --surface2:   #222222;
      --border:     #2a2a2a;
      --accent:     #e8e0d4;
      --accent-dim: #8a8178;
      --text:       #e8e0d4;
      --text-muted: #666;
      --danger:     #c0392b;
      --sidebar-w:  220px;
      --radius:     8px;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ─── Sidebar ──────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px 0;
      position: fixed;
      top: 0; left: 0;
      z-index: 10;
    }

    #sidebar .brand {
      padding: 0 24px 32px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #sidebar nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 12px;
    }

    #sidebar nav button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-align: left;
      padding: 10px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    #sidebar nav button:hover { color: var(--text); background: var(--surface2); }
    #sidebar nav button.active { color: var(--accent); background: var(--surface2); }

    #sidebar .sidebar-count {
      font-size: 11px;
      color: var(--text-muted);
      float: right;
      font-weight: 400;
    }

    #sidebar .auth-section {
      padding: 24px 12px 0;
      border-top: 1px solid var(--border);
      margin: 0 12px;
    }

    #btn-login {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      padding: 9px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    #btn-login:hover { border-color: var(--accent-dim); color: var(--text); }

    #user-info {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    #user-info.visible { display: flex; }

    #user-email {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #btn-logout {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      padding: 0;
      transition: color 0.15s;
    }
    #btn-logout:hover { color: var(--danger); }

    /* ─── Main ─────────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 48px 40px;
      min-height: 100vh;
    }

    #main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    #section-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    #btn-add {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 9px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }
    #btn-add:hover { border-color: var(--accent-dim); }
    #btn-add.visible { display: flex; }

    /* ─── Grid ─────────────────────────────────────────── */
    #vinyl-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .vinyl-card {
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: transform 0.18s, border-color 0.18s;
    }
    .vinyl-card:hover { transform: translateY(-4px); border-color: var(--accent-dim); }

    .vinyl-card .jacket {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .vinyl-card .jacket-placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 36px;
    }

    .vinyl-card .card-info {
      padding: 14px 14px 16px;
    }

    .vinyl-card .card-album {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .vinyl-card .card-artist {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ─── Modal Overlay ────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 760px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s;
      z-index: 1;
    }
    .modal-close:hover { color: var(--text); }

    /* View Modal */
    #view-modal .modal-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    #view-modal .modal-image {
      aspect-ratio: 1;
      object-fit: cover;
      width: 100%;
      display: block;
      border-radius: 12px 0 0 12px;
      background: var(--surface2);
    }

    #view-modal .modal-image-placeholder {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 64px;
      border-radius: 12px 0 0 12px;
    }

    #view-modal .modal-meta {
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .meta-field label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-dim);
      display: block;
      margin-bottom: 5px;
    }

    .meta-field .meta-value {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .meta-field .meta-value.empty { color: var(--text-muted); font-style: italic; }

    .modal-actions {
      display: none;
      gap: 10px;
      margin-top: auto;
      padding-top: 24px;
    }
    .modal-actions.visible { display: flex; }

    .btn-edit, .btn-delete {
      flex: 1;
      padding: 9px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }

    .btn-edit {
      background: var(--surface2);
      color: var(--text);
    }
    .btn-edit:hover { border-color: var(--accent-dim); }

    .btn-delete {
      background: none;
      color: var(--text-muted);
    }
    .btn-delete:hover { color: var(--danger); border-color: var(--danger); }

    /* Form Modal */
    #form-modal .modal-body {
      padding: 40px;
    }

    #form-modal h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dim);
      display: block;
      margin-bottom: 7px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent-dim);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      line-height: 1.5;
    }

    .form-group select option { background: var(--surface2); }

    /* Image upload area */
    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--accent-dim); }
    .image-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .image-upload-area .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .image-upload-area .upload-text { font-size: 12px; color: var(--text-muted); }

    .image-preview-wrap {
      display: none;
      position: relative;
      margin-top: 10px;
    }
    .image-preview-wrap.visible { display: block; }
    .image-preview-wrap img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: var(--radius);
    }
    .image-preview-wrap button {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      border-radius: 50%;
      width: 26px; height: 26px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      padding: 10px 22px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { color: var(--text); border-color: var(--accent-dim); }

    .btn-save {
      background: var(--accent);
      border: none;
      color: #0e0e0e;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 28px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Upload progress */
    .upload-progress {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .upload-progress.visible { display: block; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 12px 20px;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── Mobile Header (desktop에서는 숨김) ──────────────── */
    #mobile-header {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    #mobile-header .brand {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #mob-btn-login {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }
    #mob-btn-login:hover { border-color: var(--accent-dim); color: var(--text); }
    #mob-user-info {
      display: none;
      align-items: center;
      gap: 10px;
    }
    #mob-user-info.visible { display: flex; }
    #mob-user-email {
      font-size: 11px;
      color: var(--text-muted);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #mob-btn-logout {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s;
    }
    #mob-btn-logout:hover { color: var(--danger); }

    /* ─── Mobile Tabs (desktop에서는 숨김) ───────────────── */
    #mobile-tabs {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 10;
    }
    #mobile-tabs button {
      flex: 1;
      height: 100%;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: color 0.15s;
    }
    #mobile-tabs button.active { color: var(--accent); }
    #mobile-tabs .tab-count {
      font-size: 10px;
      color: var(--text-muted);
    }
    #mobile-tabs button.active .tab-count { color: var(--accent-dim); }

    /* ─── Mobile Breakpoint ──────────────────────────────── */
    @media (max-width: 640px) {
      body { display: block; }

      #sidebar { display: none; }
      #mobile-header { display: flex; }
      #mobile-tabs { display: flex; }

      #main {
        margin-left: 0;
        padding: 68px 16px 76px;
      }

      #main-header { margin-bottom: 20px; }

      #vinyl-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      /* 상세 모달 — 이미지 위, 메타 아래 */
      #view-modal .modal-body { grid-template-columns: 1fr; }
      #view-modal .modal-image,
      #view-modal .modal-image-placeholder {
        border-radius: 12px 12px 0 0;
        max-height: 240px;
      }
      #view-modal .modal-meta { padding: 24px 20px; }

      /* 폼 모달 패딩 축소 + 필드 세로 스택 */
      #form-modal .modal-body { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; }

      /* 모달 — 하단 시트 스타일 */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal { border-radius: 16px 16px 0 0; max-height: 88vh; }

      /* 토스트 탭바 위로 */
      #toast { bottom: 76px; }
    }
  </style>
</head>
<body>

<!-- ─── Mobile Header ─────────────────────────────────────── -->
<div id="mobile-header">
  <span class="brand">Record Shelf</span>
  <div>
    <button id="mob-btn-login" onclick="signIn()">로그인</button>
    <div id="mob-user-info">
      <span id="mob-user-email"></span>
      <button id="mob-btn-logout" onclick="signOut()">로그아웃</button>
    </div>
  </div>
</div>

<!-- ─── Sidebar ──────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="brand">Record Shelf</div>

  <nav>
    <button id="nav-owned" class="active" onclick="switchSection('owned')">
      소장 <span class="sidebar-count" id="count-owned">0</span>
    </button>
    <button id="nav-wishlist" onclick="switchSection('wishlist')">
      위시리스트 <span class="sidebar-count" id="count-wishlist">0</span>
    </button>
  </nav>

  <div class="auth-section">
    <button id="btn-login" onclick="signIn()">Google로 로그인</button>
    <div id="user-info">
      <span id="user-email"></span>
      <button id="btn-logout" onclick="signOut()">로그아웃</button>
    </div>
  </div>
</aside>

<!-- ─── Main ─────────────────────────────────────────────── -->
<main id="main">
  <div id="main-header">
    <h1 id="section-title">소장</h1>
    <button id="btn-add" onclick="openFormModal()" class="visible" style="display:none">
      + 추가
    </button>
  </div>
  <div id="vinyl-grid">
    <div class="empty-state">로딩 중…</div>
  </div>
</main>

<!-- ─── View Modal ────────────────────────────────────────── -->
<div id="view-modal" class="modal-overlay" onclick="handleOverlayClick(event, 'view-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('view-modal')">✕</button>
    <div class="modal-body">
      <div id="view-image-container"></div>
      <div class="modal-meta">
        <div class="meta-field">
          <label>Artist</label>
          <div class="meta-value" id="view-artist"></div>
        </div>
        <div class="meta-field">
          <label>Album</label>
          <div class="meta-value" id="view-album"></div>
        </div>
        <div class="meta-field">
          <label>Catalog Number</label>
          <div class="meta-value" id="view-catalog"></div>
        </div>
        <div class="meta-field">
          <label>Acquired Date</label>
          <div class="meta-value" id="view-date"></div>
        </div>
        <div class="meta-field">
          <label>Note</label>
          <div class="meta-value" id="view-note"></div>
        </div>
        <div class="modal-actions" id="view-actions">
          <button class="btn-edit" onclick="editCurrentVinyl()">수정</button>
          <button class="btn-delete" onclick="deleteCurrentVinyl()">삭제</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── Form Modal ────────────────────────────────────────── -->
<div id="form-modal" class="modal-overlay" onclick="handleOverlayClick(event, 'form-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('form-modal')">✕</button>
    <div class="modal-body">
      <h2 id="form-title">바이닐 추가</h2>

      <div class="form-group">
        <label>자켓 이미지</label>
        <div class="image-upload-area">
          <input type="file" id="image-input" accept="image/*" onchange="previewImage(event)" />
          <div class="upload-icon">🖼</div>
          <div class="upload-text">클릭하여 이미지 선택</div>
        </div>
        <div class="image-preview-wrap" id="image-preview-wrap">
          <img id="image-preview" src="" alt="preview" />
          <button onclick="clearImage()">✕</button>
        </div>
        <div class="upload-progress" id="upload-progress">업로드 중…</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Artist *</label>
          <input type="text" id="input-artist" placeholder="아티스트명" />
        </div>
        <div class="form-group">
          <label>Album *</label>
          <input type="text" id="input-album" placeholder="앨범명" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Catalog Number</label>
          <input type="text" id="input-catalog" placeholder="예) SR-001" />
        </div>
        <div class="form-group">
          <label>Acquired Date</label>
          <input type="date" id="input-date" />
        </div>
      </div>

      <div class="form-group">
        <label>Note</label>
        <textarea id="input-note" placeholder="메모…"></textarea>
      </div>

      <div class="form-group">
        <label>섹션</label>
        <select id="input-section">
          <option value="owned">소장</option>
          <option value="wishlist">위시리스트</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal('form-modal')">취소</button>
        <button class="btn-save" id="btn-save" onclick="saveVinyl()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Toast ─────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ─── Mobile Tabs ───────────────────────────────────────── -->
<div id="mobile-tabs">
  <button id="mob-nav-owned" class="active" onclick="switchSection('owned')">
    소장
    <span class="tab-count" id="mob-count-owned">0</span>
  </button>
  <button id="mob-nav-wishlist" onclick="switchSection('wishlist')">
    위시리스트
    <span class="tab-count" id="mob-count-wishlist">0</span>
  </button>
</div>

<!-- ─── Firebase Config & App ─────────────────────────────── -->
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCgL6q4RWUZFheE-8eCnGUlSWejkZAxBR4",
    authDomain: "record-shelf-7a622.firebaseapp.com",
    projectId: "record-shelf-7a622",
    storageBucket: "record-shelf-7a622.firebasestorage.app",
    messagingSenderId: "1053859550640",
    appId: "1:1053859550640:web:9ba6e7433351ff20fcf275"
  };

  firebase.initializeApp(firebaseConfig);

  const auth    = firebase.auth();
  const db      = firebase.firestore();
  const storage = firebase.storage();

  // ── State ────────────────────────────────────────────
  let currentSection  = 'owned';
  let currentUser     = null;
  let currentVinylId  = null;
  let editingId       = null;
  let selectedFile    = null;
  let existingImageUrl = null;
  let allVinyls       = [];
  let unsubscribe     = null;

  // ── Auth ─────────────────────────────────────────────
  auth.onAuthStateChanged(user => {
    currentUser = user;
    const loginBtn  = document.getElementById('btn-login');
    const userInfo  = document.getElementById('user-info');
    const userEmail = document.getElementById('user-email');
    const addBtn    = document.getElementById('btn-add');
    const viewActions = document.getElementById('view-actions');
    const mobLoginBtn  = document.getElementById('mob-btn-login');
    const mobUserInfo  = document.getElementById('mob-user-info');
    const mobUserEmail = document.getElementById('mob-user-email');

    if (user) {
      loginBtn.style.display  = 'none';
      userInfo.classList.add('visible');
      userEmail.textContent   = user.email;
      addBtn.classList.add('visible');
      addBtn.style.display    = 'flex';
      viewActions.classList.add('visible');
      mobLoginBtn.style.display = 'none';
      mobUserInfo.classList.add('visible');
      mobUserEmail.textContent  = user.email;
    } else {
      loginBtn.style.display  = '';
      userInfo.classList.remove('visible');
      addBtn.classList.remove('visible');
      addBtn.style.display    = 'none';
      viewActions.classList.remove('visible');
      mobLoginBtn.style.display = '';
      mobUserInfo.classList.remove('visible');
    }
  });

  function signIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => showToast('로그인 실패: ' + err.message));
  }

  function signOut() {
    auth.signOut();
    showToast('로그아웃했습니다');
  }

  // ── Section Switch ────────────────────────────────────
  function switchSection(section) {
    currentSection = section;
    document.getElementById('section-title').textContent =
      section === 'owned' ? '소장' : '위시리스트';

    document.getElementById('nav-owned').classList.toggle('active', section === 'owned');
    document.getElementById('nav-wishlist').classList.toggle('active', section === 'wishlist');
    document.getElementById('mob-nav-owned').classList.toggle('active', section === 'owned');
    document.getElementById('mob-nav-wishlist').classList.toggle('active', section === 'wishlist');

    subscribeVinyls();
  }

  // ── Firestore Listener ────────────────────────────────
  function subscribeVinyls() {
    if (unsubscribe) unsubscribe();

    unsubscribe = db.collection('vinyls')
      .where('section', '==', currentSection)
      .orderBy('createdAt', 'desc')
      .onSnapshot(snapshot => {
        allVinyls = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderGrid(allVinyls);
        updateCounts();
      }, err => {
        console.error(err);
        if (err.code === 'failed-precondition') {
          document.getElementById('vinyl-grid').innerHTML =
            '<div class="empty-state">Firestore 인덱스가 필요합니다.<br>콘솔 오류의 링크를 클릭하여 인덱스를 생성하세요.</div>';
        }
      });
  }

  function updateCounts() {
    db.collection('vinyls').where('section', '==', 'owned').get()
      .then(s => {
        document.getElementById('count-owned').textContent = s.size;
        document.getElementById('mob-count-owned').textContent = s.size;
      });
    db.collection('vinyls').where('section', '==', 'wishlist').get()
      .then(s => {
        document.getElementById('count-wishlist').textContent = s.size;
        document.getElementById('mob-count-wishlist').textContent = s.size;
      });
  }

  // ── Render Grid ───────────────────────────────────────
  function renderGrid(vinyls) {
    const grid = document.getElementById('vinyl-grid');
    if (!vinyls.length) {
      grid.innerHTML = '<div class="empty-state">바이닐이 없습니다.<br>+ 추가 버튼으로 등록해보세요.</div>';
      return;
    }

    grid.innerHTML = vinyls.map(v => `
      <div class="vinyl-card" onclick="openViewModal('${v.id}')">
        ${v.imageUrl
          ? `<img class="jacket" src="${escHtml(v.imageUrl)}" alt="${escHtml(v.album || '')}" loading="lazy" />`
          : `<div class="jacket-placeholder">⬛</div>`
        }
        <div class="card-info">
          <div class="card-album">${escHtml(v.album || '—')}</div>
          <div class="card-artist">${escHtml(v.artist || '—')}</div>
        </div>
      </div>
    `).join('');
  }

  // ── View Modal ────────────────────────────────────────
  function openViewModal(id) {
    const v = allVinyls.find(x => x.id === id);
    if (!v) return;
    currentVinylId = id;

    const imgContainer = document.getElementById('view-image-container');
    imgContainer.innerHTML = v.imageUrl
      ? `<img class="modal-image" src="${escHtml(v.imageUrl)}" alt="jacket" />`
      : `<div class="modal-image-placeholder">⬛</div>`;

    setMetaValue('view-artist',  v.artist);
    setMetaValue('view-album',   v.album);
    setMetaValue('view-catalog', v.catalogNumber);
    setMetaValue('view-date',    v.acquiredDate);
    setMetaValue('view-note',    v.note);

    openModal('view-modal');
  }

  function setMetaValue(id, val) {
    const el = document.getElementById(id);
    if (val) {
      el.textContent = val;
      el.classList.remove('empty');
    } else {
      el.textContent = '—';
      el.classList.add('empty');
    }
  }

  // ── Form Modal ────────────────────────────────────────
  function openFormModal(id = null) {
    editingId = id;
    selectedFile = null;
    existingImageUrl = null;

    document.getElementById('form-title').textContent = id ? '바이닐 수정' : '바이닐 추가';
    document.getElementById('image-preview-wrap').classList.remove('visible');
    document.getElementById('image-input').value = '';
    document.getElementById('upload-progress').classList.remove('visible');

    if (id) {
      const v = allVinyls.find(x => x.id === id);
      document.getElementById('input-artist').value  = v.artist  || '';
      document.getElementById('input-album').value   = v.album   || '';
      document.getElementById('input-catalog').value = v.catalogNumber || '';
      document.getElementById('input-date').value    = v.acquiredDate  || '';
      document.getElementById('input-note').value    = v.note    || '';
      document.getElementById('input-section').value = v.section || 'owned';

      if (v.imageUrl) {
        existingImageUrl = v.imageUrl;
        document.getElementById('image-preview').src = v.imageUrl;
        document.getElementById('image-preview-wrap').classList.add('visible');
      }
    } else {
      document.getElementById('input-artist').value  = '';
      document.getElementById('input-album').value   = '';
      document.getElementById('input-catalog').value = '';
      document.getElementById('input-date').value    = '';
      document.getElementById('input-note').value    = '';
      document.getElementById('input-section').value = currentSection;
    }

    openModal('form-modal');
  }

  function editCurrentVinyl() {
    closeModal('view-modal');
    setTimeout(() => openFormModal(currentVinylId), 150);
  }

  async function deleteCurrentVinyl() {
    if (!confirm('이 바이닐을 삭제할까요?')) return;
    try {
      const v = allVinyls.find(x => x.id === currentVinylId);
      if (v?.imageUrl) {
        try { await storage.refFromURL(v.imageUrl).delete(); } catch {}
      }
      await db.collection('vinyls').doc(currentVinylId).delete();
      closeModal('view-modal');
      showToast('삭제했습니다');
    } catch (err) {
      showToast('삭제 실패: ' + err.message);
    }
  }

  async function saveVinyl() {
    const artist  = document.getElementById('input-artist').value.trim();
    const album   = document.getElementById('input-album').value.trim();

    if (!artist || !album) { showToast('Artist와 Album은 필수입니다'); return; }

    const saveBtn = document.getElementById('btn-save');
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner"></span>저장 중…';

    try {
      let imageUrl = existingImageUrl || '';

      if (selectedFile) {
        const progress = document.getElementById('upload-progress');
        progress.classList.add('visible');
        const ref = storage.ref(`jackets/${Date.now()}_${selectedFile.name}`);
        await ref.put(selectedFile);
        imageUrl = await ref.getDownloadURL();
        progress.classList.remove('visible');
      }

      const data = {
        artist,
        album,
        catalogNumber: document.getElementById('input-catalog').value.trim(),
        acquiredDate:  document.getElementById('input-date').value,
        note:          document.getElementById('input-note').value.trim(),
        section:       document.getElementById('input-section').value,
        imageUrl,
        updatedAt:     firebase.firestore.FieldValue.serverTimestamp()
      };

      if (editingId) {
        await db.collection('vinyls').doc(editingId).update(data);
        showToast('수정했습니다');
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('vinyls').add(data);
        showToast('추가했습니다');
      }

      closeModal('form-modal');
    } catch (err) {
      showToast('저장 실패: ' + err.message);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }
  }

  // ── Image ─────────────────────────────────────────────
  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    selectedFile = file;
    const url = URL.createObjectURL(file);
    document.getElementById('image-preview').src = url;
    document.getElementById('image-preview-wrap').classList.add('visible');
  }

  function clearImage() {
    selectedFile = null;
    existingImageUrl = null;
    document.getElementById('image-input').value = '';
    document.getElementById('image-preview-wrap').classList.remove('visible');
  }

  // ── Modal Helpers ─────────────────────────────────────
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function handleOverlayClick(e, id) {
    if (e.target === document.getElementById(id)) closeModal(id);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal('view-modal');
      closeModal('form-modal');
    }
  });

  // ── Toast ─────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Util ──────────────────────────────────────────────
  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────
  subscribeVinyls();
</script>
</body>
</html>
